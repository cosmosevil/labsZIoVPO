spring:
  datasource:
    url: ${PG_URL}
    username: ${PG_USER}
    password: ${PG_PASS}
  sql:
    init:
      mode: always
      separator: "@@"
  jpa:
    hibernate:
      ddl-auto: none

server:
  port: 8080
  ssl:
    enabled: true
    key-store: classpath:ssl/hotel-1bib23427.p12
    key-store-type: PKCS12
    key-store-password: ${TLS_KEYSTORE_PASSWORD}
    key-alias: hotel-1bib23427

signature:
  key-store-path: classpath:signature/signing.p12
  key-store-type: PKCS12
  key-store-password: ${SIGNATURE_KEY_STORE_PASSWORD}
  key-alias: ${SIGNATURE_KEY_ALIAS}
  key-password: ${SIGNATURE_KEY_PASSWORD}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: ${MINIO_BUCKET:signature-files}
  url-expiry-minutes: ${MINIO_URL_EXPIRY_MINUTES:15}