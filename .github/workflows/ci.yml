name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Restore SSL keystore
        if: ${{ secrets.SSL_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.SSL_KEYSTORE_BASE64 }}" | base64 -d \
            > src/main/resources/ssl/hotel-1bib23427.p12

      - name: Restore signing keystore
        if: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d \
            > src/main/resources/signature/signing.p12

      - name: Build and test
        run: mvn verify
        env:
          PG_URL: ${{ secrets.PG_URL }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASS: ${{ secrets.PG_PASS }}
          TLS_KEYSTORE_PASSWORD: ${{ secrets.TLS_KEYSTORE_PASSWORD }}
          SIGNATURE_KEY_STORE_PASSWORD: ${{ secrets.SIGNATURE_KEY_STORE_PASSWORD }}
          SIGNATURE_KEY_ALIAS: ${{ secrets.SIGNATURE_KEY_ALIAS }}
          SIGNATURE_KEY_PASSWORD: ${{ secrets.SIGNATURE_KEY_PASSWORD }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}

  # Раскомментируйте и настройте, когда добавите интеграционные тесты:
